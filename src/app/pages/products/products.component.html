<section class="products-page">
  <div class="container">

    <h1 class="page-title">Danh sách sản phẩm</h1>

    <div class="product-toolbar">

      <!-- LEFT: SORT -->
      <div class="toolbar-left">
        <span class="label">Sắp xếp:</span>

        <button (click)="changeSort('default')" [class.active]="sort === 'default'">
          Mặc định
        </button>

        <button (click)="changeSort('price_asc')" [class.active]="sort === 'price_asc'">
          Giá ↑
        </button>

        <button (click)="changeSort('price_desc')" [class.active]="sort === 'price_desc'">
          Giá ↓
        </button>

        <button (click)="changeSort('best_seller')" [class.active]="sort === 'best_seller'">
          Bán chạy
        </button>

        <button (click)="changeSort('featured')" [class.active]="sort === 'featured'">
          Nổi bật
        </button>
      </div>

      <!-- RIGHT: PAGE SIZE -->
      <div class="toolbar-right">
        <span>Hiển thị:</span>

        <select [(ngModel)]="perPage" (change)="changePerPage()">
          <option [value]="8">8</option>
          <option [value]="12">12</option>
          <option [value]="16">16</option>
          <option [value]="20">20</option>
        </select>

        <span>sản phẩm</span>
      </div>

    </div>

    <div class="layout">

      <!-- SIDEBAR -->
      <aside class="sidebar">

        <!-- CATEGORY -->
        <div class="sidebar-block">
          <h3>Danh mục sản phẩm</h3>
          <ul>

            <!-- ALL -->
            <li (click)="selectCategory(null)" [class.active]="selectedCategory === null">
              Tất cả
            </li>

            <!-- CATEGORY -->
            <li *ngFor="let cat of categories" (click)="selectCategory(cat.id)"
              [class.active]="selectedCategory === cat.id">
              {{ cat.name }}
            </li>

          </ul>
        </div>

        <!-- BEST SELLER -->
        <div class="sidebar-block">
          <h3>Sản phẩm bán chạy</h3>

          <div class="best-seller-list">

            <a class="best-item" *ngFor="let item of bestSellers" [routerLink]="['/product', item.slug]">

              <img [src]="item.thumbnail">

              <div class="info">
                <h4>{{ item.name }}</h4>

                <p class="price">
                  {{ item.price | number }} đ
                </p>
              </div>

            </a>

          </div>
        </div>

      </aside>

      <!-- PRODUCT CONTENT -->
      <div class="content">

        <!-- PRODUCT GRID -->
        <div class="product-grid">
          <div class="product-card" *ngFor="let item of products">

            <img [src]="item.thumbnail" alt="{{item.name}}">

            <h4>{{ item.name }}</h4>

            <p class="price">
              {{ item.price | number }} đ
            </p>

            <a class="btn-secondary" [routerLink]="['/product', item.slug]">
              Xem chi tiết
            </a>

          </div>
        </div>

        <!-- PAGINATION -->
        <div class="pagination">
          <button (click)="loadProducts(currentPage - 1)" [disabled]="currentPage === 1">
            «
          </button>

          <button *ngFor="let p of [].constructor(lastPage); let i = index" (click)="loadProducts(i+1)"
            [class.active]="currentPage === i+1">
            {{ i+1 }}
          </button>

          <button (click)="loadProducts(currentPage + 1)" [disabled]="currentPage === lastPage">
            »
          </button>
        </div>

      </div>
    </div>
  </div>
</section>
