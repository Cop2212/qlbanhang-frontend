<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gomab - SmartLock</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>

  <!-- Messenger Chat Plugin Code -->
  <div id="fb-root"></div>
  <div id="fb-customer-chat" class="fb-customerchat"></div>

  <script>
    // Hàm khởi tạo Facebook Chat
    function initFacebookChat(pageId) {
      var chatbox = document.getElementById('fb-customer-chat');
      chatbox.setAttribute("page_id", pageId);
      chatbox.setAttribute("attribution", "biz_inbox");

      window.fbAsyncInit = function() {
        FB.init({
          xfbml            : true,
          version          : 'v18.0'
        });
      };

      (function(d, s, id) {
        var js, fjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s); js.id = id;
        js.src = 'https://connect.facebook.net/vi_VN/sdk/xfbml.customerchat.js';
        fjs.parentNode.insertBefore(js, fjs);
      }(document, 'script', 'facebook-jssdk'));
    }

    // Tự động lấy Page ID từ API Production
    var apiUrl = 'https://api.gomab.vn/api/settings';

    fetch(apiUrl)
      .then(response => response.json())
      .then(data => {
        if (data && data.facebook_page_id) {
          initFacebookChat(data.facebook_page_id);
        }
      })
      .catch(err => console.error('Không thể load cấu hình Facebook Chat:', err));
  </script>
</body>
</html>
