<footer class="footer">

  <div class="container footer-main">

    <!-- Company -->
    <div class="footer-col">
      <h4>{{ setting?.site_name }}</h4>

      <p *ngIf="setting?.address">
        📍 {{ setting?.address }}
      </p>

      <p *ngIf="setting?.email">
        ✉ {{ setting?.email }}
      </p>

      <p *ngIf="setting?.phone">
        📞 {{ setting?.phone }}
      </p>
    </div>

    <!-- Links -->
    <div class="footer-col">
      <h4>Liên kết nhanh</h4>

      <ul>
        <li><a routerLink="/">Trang chủ</a></li>
        <li><a routerLink="/products">Sản phẩm</a></li>
        <li><a routerLink="/contact">Liên hệ</a></li>
      </ul>
    </div>

    <!-- Social -->
    <div class="footer-col">
      <h4>Kết nối</h4>

      <ul>
        <li *ngIf="setting?.facebook">
          <a [href]="setting?.facebook" target="_blank">Facebook</a>
        </li>

        <li *ngIf="setting?.youtube">
          <a [href]="setting?.youtube" target="_blank">Youtube</a>
        </li>

        <li *ngIf="setting?.zalo">
          <a [href]="setting?.zalo" target="_blank">Zalo</a>
        </li>
      </ul>
    </div>

  </div>

  <div class="footer-bottom">
    {{ setting?.footer_text }}
  </div>

</footer>
