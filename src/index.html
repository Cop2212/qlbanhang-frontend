<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gomab - SmartLock</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>

  <!-- Zalo Chat Floating Button -->
  <div id="zalo-chat-wrapper"></div>

  <style>
    .zalo-float {
      position: fixed;
      width: 60px;
      height: 60px;
      bottom: 40px;
      right: 40px;
      background-color: #0068ff;
      color: #FFF;
      border-radius: 50px;
      text-align: center;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: transform 0.3s ease;
    }
    .zalo-float:hover {
      transform: scale(1.1);
      color: #fff;
    }
    .zalo-float i {
      font-size: 30px;
    }
    /* Hiệu ứng rung */
    .zalo-float {
      animation: zalo-shake 2s infinite;
    }
    @keyframes zalo-shake {
      0% { transform: scale(1); }
      10% { transform: scale(1.1) rotate(5deg); }
      20% { transform: scale(1.1) rotate(-5deg); }
      30% { transform: scale(1.1) rotate(5deg); }
      40% { transform: scale(1) rotate(0); }
      100% { transform: scale(1); }
    }
  </style>

  <script>
    var apiUrl = window.location.hostname === 'localhost' 
                 ? 'http://localhost:8000/api/settings' 
                 : 'https://api.gomab.vn/api/settings';

    fetch(apiUrl)
      .then(response => response.json())
      .then(data => {
        var wrapper = document.getElementById('zalo-chat-wrapper');
        
        if (data && data.zalo_oa_id) {
          // HIỂN THỊ KHUNG CHAT ZALO OA CHÍNH THỨC
          wrapper.innerHTML = `
            <div class="zalo-chat-widget" 
                 data-oaid="${data.zalo_oa_id}" 
                 data-welcome-message="Rất vui được hỗ trợ bạn!" 
                 data-autopopup="0" 
                 data-width="350" 
                 data-height="420"></div>
          `;
          // Tải SDK của Zalo
          var s = document.createElement('script');
          s.src = 'https://sp.zalo.me/plugins/sdk.js';
          document.body.appendChild(s);
        } 
        else if (data && data.zalo) {
          // FALLBACK: NÚT ZALO RUNG RINH DÙNG SỐ ĐIỆN THOẠI
          var zaloLink = 'https://zalo.me/' + data.zalo;
          wrapper.innerHTML = `
            <a href="${zaloLink}" class="zalo-float" title="Chat qua Zalo">
              <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg" width="35" alt="Zalo">
            </a>
          `;
        }
      })
      .catch(err => console.error('Zalo Chat: Lỗi load cấu hình:', err));
  </script>
</body>
</html>
