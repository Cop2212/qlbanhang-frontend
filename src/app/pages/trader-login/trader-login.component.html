<section class="auth-page">
    <div class="auth-box">
        <h2>Đăng nhập Trader</h2>

        <form [formGroup]="form" (ngSubmit)="login()">

            <!-- EMAIL -->
            <input type="email" placeholder="Email" formControlName="email">
            <div class="error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
                <span *ngIf="form.get('email')?.errors?.['required']">Email là bắt buộc</span>
                <span *ngIf="form.get('email')?.errors?.['email']">Email không hợp lệ</span>
            </div>

            <!-- PASSWORD -->
            <input type="password" placeholder="Mật khẩu" formControlName="password">
            <div class="error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
                Vui lòng nhập mật khẩu
            </div>

            <button class="btn-primary" type="submit" [disabled]="form.invalid">
                Đăng nhập
            </button>
        </form>

        <p>
            Chưa có tài khoản?
            <a routerLink="/trader/register">Đăng ký</a>
        </p>
    </div>
</section>
