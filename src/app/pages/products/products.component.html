<section class="products-page">
  <div class="container">

    <h1 class="page-title">Danh sách sản phẩm</h1>

    <div class="layout">
      
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <h3>Danh mục sản phẩm</h3>
        <ul>
          <li *ngFor="let cat of categories">{{ cat }}</li>
        </ul>
      </aside>

      <!-- PRODUCT CONTENT -->
      <div class="content">
        
        <!-- PRODUCT GRID -->
        <div class="product-grid">
          <div class="product-card" *ngFor="let item of products">
            <div class="image-placeholder"></div>
            <h4>{{ item.name }}</h4>
            <p class="price">{{ item.price | number }} đ</p>
            <button class="btn-secondary">Chi tiết</button>
          </div>
        </div>

        <!-- PAGINATION -->
        <div class="pagination">
          <button>«</button>
          <button class="active">1</button>
          <button>2</button>
          <button>3</button>
          <button>»</button>
        </div>

      </div>
    </div>

    <!-- BEST SELLER -->
    <div class="best-seller">
      <h2>Sản phẩm bán chạy</h2>
      <div class="product-grid">
        <div class="product-card" *ngFor="let item of products.slice(0,4)">
          <div class="image-placeholder"></div>
          <h4>{{ item.name }}</h4>
          <p class="price">{{ item.price | number }} đ</p>
        </div>
      </div>
    </div>

  </div>
</section>
