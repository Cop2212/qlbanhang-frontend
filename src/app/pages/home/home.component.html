<!-- ===== BANNER ===== -->
<section class="hero">

  <div class="hero-slider" [style.transform]="'translateX(-' + currentSlide * 100 + '%)'">

    <div class="hero-slide" *ngFor="let slider of sliders">

      <img [src]="slider.image" class="hero-bg">

      <div class="hero-overlay"></div>

      <div class="hero-content">
        <div class="container hero-inner">

          <h1>{{ slider.title }}</h1>

          <div class="hero-buttons">
            <a [routerLink]="slider.link" class="btn-primary">
              Xem sản phẩm
            </a>

            <a routerLink="/lien-he" class="btn-outline">
              Tư vấn ngay
            </a>
          </div>

        </div>
      </div>
    </div>

  </div>

  <!-- Nút điều hướng -->
  <button class="nav prev" (click)="prevSlide()">❮</button>
  <button class="nav next" (click)="nextSlide()">❯</button>

  <!-- Dots -->
  <div class="hero-dots">

    <span *ngFor="let s of sliders; let i = index" [class.active]="i === currentSlide" (click)="goToSlide(i)">
    </span>

  </div>

</section>

<!-- ===== PRODUCT SECTION ===== -->
<section class="products">
  <div class="container">

    <h2 class="section-title">Sản phẩm nổi bật</h2>

    <div class="product-grid">

      <div class="product-card" *ngFor="let item of products">

        <img [src]="item.thumbnail" alt="product">

        <h3>{{ item.name }}</h3>

        <p class="product-color" *ngIf="item.color">
          Màu: {{ item.color }}
        </p>

        <p class="price">
          {{ item.price | number }} đ
        </p>

        <a class="btn-secondary" [routerLink]="['/product', item.slug]">
          Xem chi tiết
        </a>

      </div>

    </div>

  </div>
</section>

<!-- ===== CONSULTATION SECTION ===== -->
<section class="consultation">
  <div class="container">
    <div class="consult-wrapper">
      <div class="consult-left">
        <h2>Đăng ký tư vấn miễn phí</h2>
        <p>Để lại thông tin để chúng tôi hỗ trợ bạn nhanh nhất.</p>
      </div>

      <div class="consult-right">
        <form>
          <input type="text" placeholder="Họ và tên">
          <input type="text" placeholder="Số điện thoại">
          <input type="email" placeholder="Email">
          <textarea rows="4" placeholder="Nội dung tư vấn"></textarea>
          <button class="btn-primary">Gửi thông tin</button>
        </form>
      </div>
    </div>
  </div>
</section>
