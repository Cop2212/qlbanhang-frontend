<section class="product-detail" *ngIf="product">

  <div class="container">

    <!-- ===== PRODUCT MAIN ===== -->
    <div class="product-main">

      <!-- GALLERY -->
      <div class="product-gallery">

        <img class="main-image" [src]="mainImage || product.thumbnail">

        <div class="thumbnail-list">

          <img class="thumb" [src]="product.thumbnail" (click)="changeImage(product.thumbnail)">

          <img class="thumb" *ngFor="let img of product.images" [src]="img.image_path"
            (click)="changeImage(img.image_path)">

        </div>

      </div>

      <!-- INFO -->
      <div class="product-info">

        <h1 class="product-title">{{product.name}}</h1>

        <p class="price">
          {{product.price | number}} đ
        </p>

        <p class="short-desc">
          {{product.short_description}}
        </p>

        <button class="btn-primary">
          Thêm vào giỏ hàng
        </button>

      </div>

    </div>


    <!-- ===== DESCRIPTION / REVIEWS ===== -->
    <div class="product-tabs">

      <div class="tab-header">

        <button [class.active]="activeTab === 'description'" (click)="activeTab = 'description'">
          Mô tả
        </button>

        <button [class.active]="activeTab === 'reviews'" (click)="activeTab = 'reviews'">
          Đánh giá
        </button>

      </div>

      <div class="tab-content">

        <div *ngIf="activeTab === 'description'">
          <div class="description" [innerHTML]="product.description"></div>
        </div>

        <div *ngIf="activeTab === 'reviews'">

          <div class="review">
            <strong>Nguyễn Văn A</strong>
            <p>Sản phẩm rất tốt.</p>
          </div>

          <div class="review">
            <strong>Trần Thị B</strong>
            <p>Giao hàng nhanh.</p>
          </div>

        </div>

      </div>

    </div>


    <!-- ===== SIMILAR PRODUCTS ===== -->
    <section class="products similar-products">

      <h2 class="section-title">
        Sản phẩm tương tự
      </h2>

      <div class="product-grid">

        <div class="product-card" *ngFor="let item of similarProducts">

          <a [routerLink]="['/product', item.slug]" class="card-image">
            <img [src]="item.thumbnail" alt="">
          </a>

          <div class="card-body">

            <h3 class="card-title">
              <a [routerLink]="['/product', item.slug]">
                {{ item.name }}
              </a>
            </h3>

            <p class="card-price">
              {{ item.price | number }} đ
            </p>

            <a class="btn-secondary" [routerLink]="['/product', item.slug]">
              Xem chi tiết
            </a>

          </div>

        </div>

      </div>

    </section>

  </div>

</section>
